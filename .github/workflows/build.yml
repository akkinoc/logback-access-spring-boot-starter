name: Build
on:
  push:
  pull_request:
  workflow_dispatch:
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21, 25]
    name: Build with Java ${{ matrix.java }}
    runs-on: ubuntu-24.04
    env:
      MAVEN_ARGS: -B --color always
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6.0.1
      - name: Setup Java
        uses: actions/setup-java@v5.1.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Export the project version
        run: echo PROJECT_VERSION=$(./mvnw -Dexpression=project.version -q help:evaluate) | tee -a $GITHUB_ENV
      - name: Build the project
        run: ./mvnw clean install
      - name: Build the "examples/webmvc-tomcat-java" project
        run: ./mvnw -f examples/webmvc-tomcat-java/pom.xml -Dlogback-access-spring-boot-starter.version=$PROJECT_VERSION clean install
      - name: Build the "examples/webmvc-tomcat-kotlin" project
        run: ./mvnw -f examples/webmvc-tomcat-kotlin/pom.xml -Dlogback-access-spring-boot-starter.version=$PROJECT_VERSION clean install
      - name: Build the "examples/webmvc-jetty-java" project
        run: ./mvnw -f examples/webmvc-jetty-java/pom.xml -Dlogback-access-spring-boot-starter.version=$PROJECT_VERSION clean install
      - name: Build the "examples/webflux-tomcat-java" project
        run: ./mvnw -f examples/webflux-tomcat-java/pom.xml -Dlogback-access-spring-boot-starter.version=$PROJECT_VERSION clean install
      - name: Build the "examples/webflux-jetty-java" project
        run: ./mvnw -f examples/webflux-jetty-java/pom.xml -Dlogback-access-spring-boot-starter.version=$PROJECT_VERSION clean install
      - name: Upload the coverage report to Codecov
        uses: codecov/codecov-action@v5.5.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  build-summary:
    name: Build Summary
    runs-on: ubuntu-24.04
    needs: build
    if: always()
    steps:
      - name: Check build results
        run: |
          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "All builds passed successfully"
            exit 0
          else
            echo "Some builds failed"
            exit 1
          fi
