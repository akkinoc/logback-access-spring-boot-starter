name: Publish
on:
  push:
    tags:
      - v*
  schedule:
    - cron: 0 12 * * *
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  publish:
    name: Publish
    runs-on: ubuntu-24.04
    environment:
      name: maven-central-${{ case(startsWith(github.ref, 'refs/tags/v'), 'release', 'snapshot') }}
      url: ${{ vars.MAVEN_CENTRAL_URL }}
    env:
      GRADLE_OPTS: -Dorg.gradle.console=colored
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: actions/setup-java@v5.3.0
        with:
          distribution: temurin
          java-version-file: .tool-versions
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
      - name: Build
        run: ./gradlew clean build
      - name: Publish ${{ case(startsWith(github.ref, 'refs/tags/v'), 'Release', 'Snapshot') }} to Maven Local
        run: ./gradlew publishToMavenLocal ${{ case(startsWith(github.ref, 'refs/tags/v'), '', '-Prelease.forceSnapshot') }}
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
      - name: Publish ${{ case(startsWith(github.ref, 'refs/tags/v'), 'Release', 'Snapshot') }} to Maven Central
        run: ./gradlew publishToMavenCentral ${{ case(startsWith(github.ref, 'refs/tags/v'), '', '-Prelease.forceSnapshot') }}
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: artifact
          path: |
            **/build/publications/
            **/build/libs/
            **/build/reports/
        if: ${{ !cancelled() }}
